<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Response</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background:radial-gradient(circle at top, rgba(34,211,238,.18), transparent 35%), #0b1220;
  color:#fff;
  display:grid;
  place-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:560px;
  background:rgba(17,24,39,.94);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:28px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  font-weight:900;
  margin-bottom:14px;
  background:rgba(34,211,238,.14);
  color:#22d3ee;
}

.total{
  font-size:2.2rem;
  font-weight:900;
  color:#34d399;
  margin:14px 0;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.accept{ background:#34d399; color:#021; }
.decline{ background:#f59e0b; color:#021; }

.success{ color:#34d399; }
.declined{ color:#f59e0b; }
.error{ color:#ef4444; }
</style>
</head>

<body>

<div class="card">
  <div class="badge" id="badge">Quote</div>

  <h1 id="title">Loading...</h1>
  <p id="message">Please wait</p>

  <div id="quoteBlock" style="display:none;">
    <div id="quoteService"></div>
    <div id="quoteAddress" style="opacity:.7;"></div>
    <div class="total" id="quoteTotal">$0</div>
  </div>

  <div class="actions" id="actions" style="display:none;">
    <button class="accept" onclick="respond('Accepted')">Accept Quote</button>
    <button class="decline" onclick="respond('Declined')">Decline Quote</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ehckicrcukzdbdhbgkhe.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_8XCfgwdnx0ZghIB4ndS_bw_DXHvQeV0";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const quoteId = params.get("quote");

const badge = document.getElementById("badge");
const title = document.getElementById("title");
const message = document.getElementById("message");

const quoteBlock = document.getElementById("quoteBlock");
const actions = document.getElementById("actions");

let quoteData = null;

function setScreen(type, heading, text){
  title.textContent = heading;
  message.textContent = text;
  title.className = type || "";
}

async function loadQuote(){
  if(!quoteId){
    setScreen("error","Invalid link","Missing quote ID");
    return;
  }

  const { data, error } = await supabaseClient
    .from("quotes")
    .select("*")
    .eq("id", quoteId)
    .single();

  if(error || !data){
    console.error(error);
    setScreen("error","Quote not found","Contact the business");
    return;
  }

  quoteData = data;

  document.getElementById("quoteService").textContent = data.service || "Service";
  document.getElementById("quoteAddress").textContent = data.address || "";
  document.getElementById("quoteTotal").textContent = "$" + Number(data.total || 0).toLocaleString();

  quoteBlock.style.display = "block";
  actions.style.display = "flex";

  setScreen("", "Review Your Quote", "Choose Accept or Decline");

  // mark viewed
  if(!data.viewed_at){
    await supabaseClient
      .from("quotes")
      .update({
        status:"Viewed",
        viewed_at:new Date().toISOString()
      })
      .eq("id", quoteId);
  }
}

async function respond(status){
  if(!quoteData) return;

  const { error } = await supabaseClient
    .from("quotes")
    .update({
      status,
      responded_at:new Date().toISOString()
    })
    .eq("id", quoteId);

  if(error){
    console.error(error);
    setScreen("error","Error","Could not save response");
    return;
  }

  if(status === "Accepted"){
    setScreen("success","Quote Accepted 🎉","We’ll be in touch soon");
  }else{
    setScreen("declined","Quote Declined","Thanks for letting us know");
  }

  actions.style.display = "none";
}

loadQuote();
</script>

</body>
</html>
